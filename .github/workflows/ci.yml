name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification
        continue-on-error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Mypy type check
        run: |
          for package in packages/* services/*; do
            if [ -d "$package/src" ]; then
              echo "Checking $package..."
              mypy "$package/src" --ignore-missing-imports || exit 1
            fi
          done

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [security-scan, lint]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: civicproof
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: civicproof_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio hypothesis
          pip install -e packages/common -e packages/eval
          for req in services/*/requirements.txt; do
            [ -f "$req" ] && pip install -r "$req"
          done
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://civicproof:testpass@localhost:5432/civicproof_test
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: packages/common/src:packages/eval/src:services/worker/src:services/api/src:services/gateway/src
        run: |
          if [ -d tests/unit ] && [ -n "$(find tests/unit -name 'test_*.py' 2>/dev/null)" ]; then
            pytest tests/unit/ -v --cov=packages --cov=services --cov-report=xml --cov-fail-under=80
          else
            echo "No unit tests found — skipping (tests/unit/ must contain test_*.py files)"
          fi
      - name: Run contract tests
        run: |
          if [ -d tests/contract ] && [ -n "$(find tests/contract -name 'test_*.py' 2>/dev/null)" ]; then
            pytest tests/contract/ -v
          else
            echo "No contract tests found — skipping"
          fi
      - name: Upload coverage
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api, worker, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: |
          if [ -f services/${{ matrix.service }}/Dockerfile ]; then
            docker build services/${{ matrix.service }} -t civicproof-${{ matrix.service }}:test
          else
            echo "Dockerfile for ${{ matrix.service }} not yet created — skipping"
          fi

  eval-gate:
    name: Eval Release Gate
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: civicproof
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: civicproof_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e packages/common -e packages/eval
          for req in services/*/requirements.txt; do
            [ -f "$req" ] && pip install -r "$req"
          done
      - name: Run eval suite tests
        env:
          PYTHONPATH: packages/common/src:services/worker/src:services/api/src:services/gateway/src:packages/eval/src
          DATABASE_URL: postgresql://civicproof:testpass@localhost:5432/civicproof_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/unit/test_eval_suite.py -v --tb=short
      - name: Run red-team adversarial suite
        env:
          PYTHONPATH: packages/common/src:services/worker/src:services/api/src:services/gateway/src:packages/eval/src
        run: |
          pytest tests/red_team/ -v -m red_team --tb=short

