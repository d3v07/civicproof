name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Type check (when types added)
        run: echo "mypy checks will be added per service"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [security-scan, lint]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: civicproof
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: civicproof_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio hypothesis
          if [ -f packages/common/requirements.txt ]; then pip install -r packages/common/requirements.txt; fi
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://civicproof:testpass@localhost:5432/civicproof_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/unit/ -v --cov=packages --cov=services --cov-report=xml --cov-fail-under=80
      - name: Run contract tests
        run: pytest tests/contract/ -v || echo "Contract tests not yet implemented"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api, worker, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: |
          if [ -f services/${{ matrix.service }}/Dockerfile ]; then
            docker build services/${{ matrix.service }} -t civicproof-${{ matrix.service }}:test
          else
            echo "Dockerfile for ${{ matrix.service }} not yet created"
          fi
